<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fellowship — Découvrir</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#160e0d;--sidebar:#1b1311;--surface:#221815;--text:#fbf3e8;--muted:#ac9c8f;--line:rgba(255,240,225,.09);--cop:hsl(25 78% 52%);--cop-d:hsl(16 70% 40%);--green:#a8cc7a;--amber:#ffce85;--h:'Plus Jakarta Sans',sans-serif;--b:'Inter',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#160e0d}
  body{font-family:var(--b);color:var(--text);-webkit-font-smoothing:antialiased;font-size:15px;overflow:hidden}
  h1,h2,h3{font-family:var(--h);font-weight:800;letter-spacing:-.02em}
  svg{stroke-linecap:round;stroke-linejoin:round;fill:none;stroke:currentColor}
  img{display:block}
  .sidebar{position:fixed;left:0;top:0;width:262px;height:100vh;background:rgba(27,19,17,.7);backdrop-filter:blur(16px);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;z-index:30}
  .logo{font-family:var(--h);font-weight:800;font-size:20px;display:flex;align-items:center;gap:9px;padding:6px 8px 16px}
  .logo .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--cop),var(--amber));display:flex;align-items:center;justify-content:center;color:#2a1810;font-size:14px}
  .entity{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:12px;background:var(--surface);margin-bottom:16px}
  .entity .av{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#6b4a2e,#3c2a1a);display:flex;align-items:center;justify-content:center;font-weight:700;color:#ffd9a8;font-size:14px}
  .entity .nm b{font-family:var(--h);font-size:14px;display:block}.entity .nm span{font-size:11px;color:var(--muted)}
  .nav{display:flex;flex-direction:column;gap:3px;flex:1}
  .nav a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-weight:500;font-size:14px}
  .nav a svg{width:18px;height:18px;stroke-width:2}
  .nav a:hover{background:var(--surface);color:var(--text)}
  .nav a.active{background:color-mix(in srgb,var(--cop) 16%,transparent);color:var(--amber)}
  .side-foot{border-top:1px solid var(--line);padding-top:12px;display:flex;align-items:center;gap:10px}
  .side-foot .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--green),hsl(92 40% 46%))}
  .side-foot .nm{flex:1}.side-foot .nm b{font-size:13px;font-family:var(--h)}.side-foot .nm span{font-size:11px;color:var(--muted);display:block}

  .stage{position:fixed;left:262px;right:0;top:0;bottom:0;overflow:hidden}
  .ambient{position:absolute;inset:0;z-index:0;transition:opacity .6s}
  .ambient img{width:100%;height:100%;object-fit:cover;filter:blur(50px) brightness(.4);transform:scale(1.2)}
  .ambient::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 100% at 50% 35%,rgba(20,12,10,.28),rgba(20,12,10,.84))}
  .stagewrap{position:relative;z-index:2;height:100%;display:flex;flex-direction:column}

  .top{display:flex;justify-content:center;padding:22px 20px 6px;position:relative}
  .searchbar{display:inline-flex;align-items:center;background:rgba(255,255,255,.12);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.24);border-radius:99px;padding:6px 6px 6px 10px;box-shadow:0 14px 36px rgba(0,0,0,.38)}
  .seg{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;gap:1px;padding:8px 22px;border-radius:99px;transition:.15s}
  .seg:hover{background:rgba(255,255,255,.14)}
  .seg.active{background:rgba(255,255,255,.2)}
  .seg-l{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--amber)}
  .seg-v{font-size:14px;font-weight:600;color:#fff;white-space:nowrap}
  .seg-sep{width:1px;height:30px;background:rgba(255,255,255,.22)}
  .seg-search{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--cop),var(--cop-d));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:8px;flex-shrink:0}
  .seg-search svg{width:20px;height:20px;stroke-width:2.4}
  .pop{position:absolute;top:84px;left:50%;transform:translate(-50%,8px);background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 24px 60px rgba(0,0,0,.55);z-index:40;opacity:0;visibility:hidden;transition:.18s}
  .pop.open{opacity:1;visibility:visible;transform:translate(-50%,0)}
  .pop h4{font-family:var(--h);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px}
  .catgrid{display:grid;grid-template-columns:repeat(3,minmax(115px,1fr));gap:8px;width:395px}
  .catchip{display:flex;align-items:center;gap:7px;padding:10px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--line);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:.12s;text-align:left}
  .catchip:hover{border-color:var(--amber)}
  .catchip.on{background:color-mix(in srgb,var(--cop) 20%,transparent);border-color:var(--amber);color:var(--amber)}
  .popline{display:flex;align-items:center;gap:12px;color:var(--text);font-size:14px;margin-bottom:12px;width:340px}
  .popline:last-child{margin-bottom:0}
  .popline input[type=text]{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--b);font-size:14px;outline:none}
  .peropts{display:flex;flex-wrap:wrap;gap:8px;width:340px}
  .peropt{padding:9px 14px;border-radius:99px;background:var(--surface2);border:1px solid var(--line);color:var(--text);font-size:13px;font-weight:600;cursor:pointer}
  .peropt:hover{border-color:var(--amber)}
  .peropt.on{background:color-mix(in srgb,var(--cop) 20%,transparent);border-color:var(--amber);color:var(--amber)}
  .bottombar{display:flex;flex-direction:column;align-items:center;gap:11px;padding:14px 0 26px}
  .distpill{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(8px);border-radius:99px;padding:8px 16px;font-size:13px;color:#fff;font-weight:600}
  .distpill input[type=range]{-webkit-appearance:none;appearance:none;width:80px;height:4px;border-radius:99px;background:rgba(255,255,255,.28);outline:none;cursor:pointer}
  .distpill input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--amber);cursor:pointer}
  .distpill input[type=range]::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--amber);cursor:pointer}
  .distpill b{font-family:var(--h);color:var(--amber);min-width:48px;text-align:right}
  .card .cfriends{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.88);font-size:12.5px;margin-top:3px}
  .cav{display:flex}.cav span{width:24px;height:24px;border-radius:50%;border:2px solid rgba(0,0,0,.4);margin-left:-8px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#1c1310}.cav span:first-child{margin-left:0}

  .stagebody{flex:1;position:relative;min-height:0}
  .flow{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;perspective:1700px}
  .infozone{position:absolute;left:0;right:0;top:calc(50% + 22vh);bottom:0;display:flex;align-items:center;justify-content:center;padding:0 20px}
  .deck{position:relative;width:100%;height:44vh;transform-style:preserve-3d}
  .card{position:absolute;left:50%;top:50%;width:33vh;height:44vh;overflow:hidden;transition:transform .6s cubic-bezier(.4,0,.2,1),opacity .5s,filter .5s;box-shadow:0 30px 70px rgba(0,0,0,.55);will-change:transform;cursor:pointer}
  .card img{width:100%;height:100%;object-fit:cover}
  .card .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 3%,transparent 48%);opacity:0;transition:opacity .4s}
  .card.is-center .grad{opacity:1}
  .card.is-center img{animation:kb 9s ease-in-out infinite alternate}
  @keyframes kb{from{transform:scale(1.01)}to{transform:scale(1.1)}}
  .card .info{position:absolute;left:0;right:0;bottom:0;padding:26px 26px 24px;display:flex;flex-direction:column;gap:8px;opacity:0;transform:translateY(12px);transition:opacity .45s .1s,transform .45s .1s}
  .card.is-center .info{opacity:1;transform:none}
  .card .eyb{font-size:10px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--amber)}
  .card h2{font-size:26px;line-height:1.05;color:#fff}
  .card .ctag{align-self:flex-start;font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;background:rgba(255,255,255,.18);color:#fff;backdrop-filter:blur(4px)}
  .card .cmeta{color:rgba(255,255,255,.88);font-size:13px;display:flex;gap:12px;flex-wrap:wrap}
  .card .open{color:var(--green);font-weight:600}

  .arrow{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;z-index:20}
  .arrow:hover{background:rgba(255,255,255,.22)}
  .arrow svg{width:24px;height:24px;stroke-width:2.2}
  .arrow.l{left:3%}.arrow.r{right:3%}

  .dock{display:flex;flex-direction:column;align-items:center;gap:17px}
  .dockinfo{text-align:center;display:flex;flex-direction:column;align-items:center;gap:13px;max-width:620px;padding:0 20px}
  .dockinfo .eyb{font-size:10.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--amber)}
  .dockinfo h2{font-size:27px;color:#fff;line-height:1.05}
  .dockinfo .tagline{display:flex;align-items:center;gap:11px;flex-wrap:wrap;justify-content:center}
  .dockinfo .ctag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;background:rgba(255,255,255,.16);color:#fff}
  .dockinfo .meta{color:rgba(255,255,255,.85);font-size:13.5px}
  .dockinfo .fr{display:flex;align-items:center;justify-content:center;gap:9px;color:rgba(255,255,255,.88);font-size:13px}
  .dockinfo .fr .cav span{width:26px;height:26px;font-size:10px;border-color:rgba(20,12,10,.55)}
  .cta{display:flex;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--b);font-weight:600;font-size:14.5px;border-radius:99px;padding:13px 26px;border:none;cursor:pointer;text-decoration:none}
  .btn-p{background:linear-gradient(135deg,var(--cop),var(--cop-d));color:#fff;box-shadow:0 8px 26px hsl(20 65% 32% / .5)}
  .btn-star{background:var(--green);color:#1b2e10}
  .counter{font-size:12.5px;color:rgba(255,255,255,.7)}.counter b{font-family:var(--h);color:#fff}

  @media(max-width:1080px){.sidebar{display:none}.stage{left:0}.arrow.l{left:6px}.arrow.r{right:6px}.card{width:54vw;height:50vh}}
</style>
</head>

    <a href="#"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg> Tableau de bord</a>

    <a href="#"><svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/></svg> Ma vitrine</a>

  <div class="side-foot"><div class="av"></div><div class="nm"><b>Uriel</b><span>Mon compte</span></div></div>
</aside>

<main class="stage">
  <div class="ambient" id="amb"><img src="https://picsum.photos/seed/perouges/1200/1000" alt=""></div>
  <div class="stagewrap">

    <div class="top">
      <div class="searchbar">

          <button class="catchip">🎄 Noël</button>
          <button class="catchip">🎨 Art</button>
          <button class="catchip">🍷 Gastronomie</button>
          <button class="catchip">📚 Livre / BD</button>
          <button class="catchip">🎭 Spectacle</button>
          <button class="catchip">🌿 Nature</button>

        <div class="popline">📍 Rayon <div class="distpill" style="border:none;background:none;padding:0;flex:1"><input type="range" min="10" max="300" value="50" class="dist" style="width:100%"> <b id="distval">50 km</b></div></div>

</main>

<script>
  const cards=[...document.querySelectorAll('.card')];
  const amb=document.querySelector('#amb img');
  const cur=document.getElementById('cur');
  const diEyb=document.getElementById('di-eyb'),diName=document.getElementById('di-name'),diTag=document.getElementById('di-tag'),diMeta=document.getElementById('di-meta'),diFr=document.getElementById('di-fr');
  let active=2;
  function layout(){
    cards.forEach((c,i)=>{
      const o=i-active, ao=Math.abs(o);
      if(ao>2){ c.style.opacity='0'; c.style.pointerEvents='none'; c.style.transform='translate(-50%,-50%) translateX('+(o>0?170:-170)+'%) scale(.5)'; c.classList.remove('is-center'); return; }
      c.style.pointerEvents='auto'; c.style.opacity='1';
      c.style.filter = o===0?'none':(ao===1?'brightness(.45)':'brightness(.3)');
      c.style.zIndex = String(10-ao);
      const tx=o===0?0:(o<0?-1:1)*(ao===1?104:152), rot=o===0?0:(o<0?18:-18), sc=o===0?1:(ao===1?.74:.62);
      c.style.transform='translate(-50%,-50%) translateX('+tx+'%) rotateY('+rot+'deg) scale('+sc+')';
      c.classList.toggle('is-center',o===0);
    });
    cur.textContent=String(active+1);
    const d=cards[active].dataset;
    diEyb.textContent=d.eyb||''; diName.textContent=d.name||''; diTag.textContent=d.tag||''; diMeta.textContent=d.meta||'';
    while(diFr.firstChild) diFr.removeChild(diFr.firstChild);
    if(d.fr){
      diFr.style.display='';
      if(d.avs){
        const cav=document.createElement('span'); cav.className='cav';
        d.avs.split(',').forEach(a=>{ const p=a.split('|'); const s=document.createElement('span'); s.textContent=p[0]; s.style.background=p[1]; cav.appendChild(s); });
        diFr.appendChild(cav);
      }
      diFr.appendChild(document.createTextNode(d.fr));
    } else { diFr.style.display='none'; }
    if(d.amb) amb.src=d.amb;
  }
  function go(d){ active=(active+d+cards.length)%cards.length; layout(); reset(); }
  cards.forEach((c,i)=>c.addEventListener('click',()=>{ if(i!==active){active=i;layout();reset();} }));
  document.getElementById('prev').onclick=()=>go(-1);
  document.getElementById('next').onclick=()=>go(1);
  let timer=setInterval(()=>go(1),4500);
  function reset(){ clearInterval(timer); timer=setInterval(()=>go(1),4500); }
  const dist=document.querySelector('.dist');
  if(dist) dist.addEventListener('input',e=>{ document.getElementById('distval').textContent=e.target.value+' km'; document.getElementById('sv-ou').textContent=e.target.value+' km autour de Lyon'; const af=document.getElementById('allfrance'); if(af) af.classList.remove('on'); });
  const allFr=document.getElementById('allfrance');
  if(allFr) allFr.addEventListener('click',()=>{ allFr.classList.toggle('on'); document.getElementById('sv-ou').textContent = allFr.classList.contains('on') ? 'Toute la France' : (dist.value+' km autour de Lyon'); });

  // barre segmentée : popovers
  const segs=[...document.querySelectorAll('.seg')];
  function closePops(){ document.querySelectorAll('.pop.open').forEach(p=>p.classList.remove('open')); segs.forEach(s=>s.classList.remove('active')); }
  segs.forEach(s=>s.addEventListener('click',ev=>{ ev.stopPropagation(); const pop=document.getElementById(s.dataset.pop); const open=pop.classList.contains('open'); closePops(); if(!open){ pop.classList.add('open'); s.classList.add('active'); } }));
  document.querySelectorAll('.pop').forEach(p=>p.addEventListener('click',e=>e.stopPropagation()));
  document.addEventListener('click',closePops);
  document.querySelectorAll('#pop-quoi .catchip').forEach(c=>c.addEventListener('click',()=>{ document.querySelectorAll('#pop-quoi .catchip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); document.getElementById('sv-quoi').textContent=c.textContent.replace(/^\S+\s/,''); }));
  document.querySelectorAll('#pop-quand .peropt').forEach(c=>c.addEventListener('click',()=>{ document.querySelectorAll('#pop-quand .peropt').forEach(x=>x.classList.remove('on')); c.classList.add('on'); document.getElementById('sv-quand').textContent=c.textContent; }));

  layout();
</script>
</body>
</html>
